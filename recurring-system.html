<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recurring System</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body { margin:0; background:#f6f8fb; color:#111827; font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    .sys-shell { max-width:1100px; margin:28px auto; padding:0 20px 40px; }
    .sys-header, .sys-panel { background:#fff; border:1px solid #e5e7eb; border-radius:8px; box-shadow:0 12px 28px rgba(15,23,42,.06); }
    .sys-header { padding:24px; margin-bottom:18px; display:flex; flex-wrap:wrap; gap:16px; justify-content:space-between; align-items:center; }
    .sys-header h1 { margin:0; font-size:1.8rem; }
    .sys-header p { margin:8px 0 0; color:#475569; line-height:1.6; }
    .sys-actions { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; }
    .sys-panel { padding:20px; }
    .sys-list { display:grid; gap:10px; }
    .sys-row { display:grid; grid-template-columns:1.5fr 1fr 1fr .8fr; gap:12px; align-items:center; padding:14px; border:1px solid #e5e7eb; border-radius:8px; background:#fff; }
    .sys-row strong { display:block; color:#0f172a; }
    .sys-row span { color:#64748b; font-size:.92rem; }
    .chip { display:inline-flex; width:max-content; padding:6px 10px; border-radius:999px; background:#eef2ff; color:#1d4ed8; font-weight:700; font-size:.84rem; }
    .chip.paused { background:#f3f4f6; color:#374151; }
    .btn-primary, .btn-secondary { border:0; border-radius:8px; padding:11px 15px; font-weight:700; cursor:pointer; }
    .btn-primary { background:#2563eb; color:#fff; }
    .btn-secondary { background:#f3f4f6; color:#1f2937; }
    .sys-status { margin-top:14px; color:#334155; min-height:22px; }
    .empty { padding:24px; border:1px dashed #cbd5e1; border-radius:8px; text-align:center; color:#64748b; }
    @media (max-width:760px) {
      .sys-row { grid-template-columns:1fr; }
      .sys-actions, .sys-actions button { width:100%; }
    }
  </style>
</head>
<body>
  <div class="sys-shell">
    <header class="sys-header">
      <div>
        <button class="btn-secondary" onclick="window.history.back()">Back</button>
        <h1>Recurring System</h1>
        <p>Administrative view for running due schedules and moving recurring definitions between browsers.</p>
      </div>
      <div class="sys-actions">
        <button class="btn-primary" onclick="runDueNow()">Run due schedules</button>
        <button class="btn-secondary" onclick="exportRecurring()">Export JSON</button>
        <button class="btn-secondary" onclick="document.getElementById('importFile').click()">Import JSON</button>
      </div>
    </header>
    <section class="sys-panel">
      <div id="sysList" class="sys-list"></div>
      <div id="sysStatus" class="sys-status"></div>
      <input id="importFile" type="file" style="display:none" accept="application/json" onchange="importRecurring(event)" />
    </section>
  </div>

  <script src="assets/js/recurring.js"></script>
  <script>
    function formatDate(value){
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? 'Not scheduled' : d.toLocaleString();
    }

    function refresh(){
      const el = document.getElementById('sysList');
      const items = RecurringInvoices.list().sort((a,b)=>new Date(a.nextRun)-new Date(b.nextRun));
      if(!items.length) {
        el.innerHTML = '<div class="empty">No recurring schedules are stored in this browser.</div>';
        return;
      }
      el.innerHTML = items.map(item => `
        <div class="sys-row">
          <div><strong>${item.name || 'Untitled schedule'}</strong><span>${item.clientName || 'No client'} - ${Number(item.amount || 0).toLocaleString()}</span></div>
          <div><strong>${item.schedule || 'monthly'} / ${item.interval || 1}</strong><span>Frequency</span></div>
          <div><strong>${formatDate(item.nextRun)}</strong><span>Next run</span></div>
          <div><span class="chip ${item.active === false ? 'paused' : ''}">${item.active === false ? 'Paused' : 'Active'}</span></div>
        </div>
      `).join('');
    }

    function runDueNow(){
      const changed = RecurringInvoices.checkAndRun();
      refresh();
      document.getElementById('sysStatus').innerText = changed.length ? `Generated ${changed.length} recurring invoice(s).` : 'No schedules are due right now.';
    }

    function exportRecurring(){
      const data = JSON.stringify(RecurringInvoices.list(), null, 2);
      const blob = new Blob([data], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'recurring_definitions.json';
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(a.href);
    }

    function importRecurring(e){
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(){
        try{
          const parsed = JSON.parse(reader.result);
          if (!Array.isArray(parsed)) throw new Error('Import must be a JSON array.');
          const clean = parsed.map(item => RecurringInvoices.create(Object.assign({}, item, { id: undefined })));
          refresh();
          document.getElementById('sysStatus').innerText = `Imported ${clean.length} recurring definition(s).`;
        }catch(err){
          document.getElementById('sysStatus').innerText = err.message || 'Invalid import file.';
        } finally {
          e.target.value = '';
        }
      };
      reader.readAsText(file);
    }

    document.addEventListener('DOMContentLoaded', function(){
      refresh();
      window.addEventListener('storage', function(e){ if(e.key==='recurringInvoices') refresh(); });
    });
  </script>
</body>
</html>
