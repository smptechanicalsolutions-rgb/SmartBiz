<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Resend Verification - Invoice Generator</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh; background: #f5f6fa;">
  <div class="container" style="max-width: 550px;">
    <div class="form-card p-5" style="min-height: 400px;">
      <h2 class="text-center mb-4" style="font-size:2rem;">Resend Verification Email</h2>
      <div id="resendError" class="alert alert-danger d-none"></div>
      <div id="resendSuccess" class="alert alert-success d-none"></div>
      <form id="resendForm">
        <div class="mb-3">
          <label for="email" class="form-label" style="font-size:1.1rem;">Email address</label>
          <input type="email" id="email" class="form-control" style="font-size:1.1rem;" required autofocus />
        </div>
        <small class="form-text text-muted mb-2">Press Enter to submit</small>
        <button type="submit" id="resendBtn" class="btn btn-gradient w-100">Send Link</button>
      </form>
      <p class="mt-3 text-center"><a href="login.html">Back to Login</a></p>
    </div>
  </div>
  <script src="assets/js/auth.js"></script>
</body>
</html>
