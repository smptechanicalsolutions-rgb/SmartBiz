<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password - Invoice Generator</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh; background: #f5f6fa;">
  <div class="container" style="max-width: 550px;">
    <div class="form-card p-5" style="min-height: 500px;">
      <h2 class="text-center mb-4" style="font-size:2rem;">Reset Password</h2>
      <div id="resetError" class="alert alert-danger d-none"></div>
      <div id="resetSuccess" class="alert alert-success d-none"></div>
      <form id="resetForm">
        <div class="mb-3">
          <label for="password" class="form-label" style="font-size:1.1rem;">New Password</label>
          <input type="password" id="password" class="form-control" style="font-size:1.1rem;" required minlength="6" maxlength="8" autofocus />
          <span class="toggle-password" style="position:absolute;right:10px;top:35px;cursor:pointer;user-select:none;">👁️</span>
        </div>
        <div class="mb-3 position-relative">
          <label for="confirmPassword" class="form-label" style="font-size:1.1rem;">Confirm Password</label>
          <input type="password" id="confirmPassword" class="form-control" style="font-size:1.1rem;" required minlength="6" maxlength="8" />
          <span class="toggle-password" style="position:absolute;right:10px;top:35px;cursor:pointer;user-select:none;">👁️</span>
        </div>
        <small class="form-text text-muted mb-2">Press Enter to submit</small>
        <button type="submit" id="resetBtn" class="btn btn-gradient w-100">Change Password</button>
      </form>
      <p class="mt-3 text-center"><a href="login.html">Back to Login</a></p>
    </div>
  </div>
  <script src="assets/js/auth.js"></script>
</body>
</html>
