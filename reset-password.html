<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Invoice Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 50px;
            max-width: 500px;
            width: 100%;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .reset-header i {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .reset-header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .reset-header p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 0.85rem;
            display: none;
        }

        .password-strength.weak {
            color: #dc3545;
        }

        .password-strength.medium {
            color: #ffc107;
        }

        .password-strength.strong {
            color: #28a745;
        }

        .reset-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .reset-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .reset-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .reset-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .reset-header h1 {
                font-size: 2rem;
            }

            .reset-header i {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <i class="fas fa-lock"></i>
            <h1>Reset Password</h1>
            <p>Enter your new password below.</p>
        </div>

        <div id="resetError" class="alert alert-danger"></div>
        <div id="resetSuccess" class="alert alert-success"></div>
        <div id="resetInfo" class="alert alert-info"></div>

        <form id="resetForm">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter new password" minlength="6">
                <div id="passwordStrength" class="password-strength"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm new password" minlength="6">
            </div>

            <button type="submit" id="resetBtn" class="reset-btn">
                <i class="fas fa-key"></i>
                <span>Reset Password</span>
            </button>
        </form>

        <div class="back-link">
            <a href="login.html">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>
        </div>
    </div>

    <script src="assets/js/auth-service.js"></script>
    <script>
        function showAlert(message, type) {
            // Hide all alerts
            document.getElementById('resetError').style.display = 'none';
            document.getElementById('resetSuccess').style.display = 'none';
            document.getElementById('resetInfo').style.display = 'none';

            // Show the specific alert
            const alertElement = document.getElementById('reset' + type.charAt(0).toUpperCase() + type.slice(1));
            alertElement.textContent = message;
            alertElement.style.display = 'block';

            // Auto hide success/info messages after 5 seconds
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    alertElement.style.display = 'none';
                }, 5000);
            }
        }

        function validatePassword(password) {
            const strengthElement = document.getElementById('passwordStrength');
            strengthElement.style.display = 'block';

            if (password.length < 6) {
                strengthElement.textContent = 'Password must be at least 6 characters';
                strengthElement.className = 'password-strength weak';
                return false;
            }

            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            if (strength <= 1) {
                strengthElement.textContent = 'Weak password';
                strengthElement.className = 'password-strength weak';
            } else if (strength === 2) {
                strengthElement.textContent = 'Medium password';
                strengthElement.className = 'password-strength medium';
            } else {
                strengthElement.textContent = 'Strong password';
                strengthElement.className = 'password-strength strong';
            }

            return true;
        }

        // Check URL parameters
        function checkResetToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const email = urlParams.get('email');

            if (!token || !email) {
                showAlert('Invalid reset link. Please request a new password reset.', 'error');
                document.getElementById('resetForm').style.display = 'none';
                return false;
            }

            // Check if token is valid (not expired and not used)
            const resetTokens = JSON.parse(localStorage.getItem('passwordResetTokens') || '{}');
            const tokenData = resetTokens[decodeURIComponent(email)];

            if (!tokenData || tokenData.token !== token || tokenData.used) {
                showAlert('Invalid or expired reset link. Please request a new password reset.', 'error');
                document.getElementById('resetForm').style.display = 'none';
                return false;
            }

            // Check if token is expired (24 hours)
            const tokenAge = Date.now() - tokenData.timestamp;
            if (tokenAge > 24 * 60 * 60 * 1000) {
                showAlert('Reset link has expired. Please request a new password reset.', 'error');
                document.getElementById('resetForm').style.display = 'none';
                return false;
            }

            return true;
        }

        // Password strength validation
        document.getElementById('password').addEventListener('input', function() {
            validatePassword(this.value);
        });

        // Form submission
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('i');

            // Validate passwords
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            if (!validatePassword(password)) {
                showAlert('Please enter a stronger password', 'error');
                return;
            }

            // Get email from URL
            const urlParams = new URLSearchParams(window.location.search);
            const email = decodeURIComponent(urlParams.get('email'));

            // Show loading state
            btn.disabled = true;
            btnText.textContent = 'Resetting...';
            btnIcon.className = 'spinner';

            try {
                // Update user password
                const result = authService.updatePassword(email, password);

                if (result.success) {
                    // Mark token as used
                    const resetTokens = JSON.parse(localStorage.getItem('passwordResetTokens') || '{}');
                    if (resetTokens[email]) {
                        resetTokens[email].used = true;
                        localStorage.setItem('passwordResetTokens', JSON.stringify(resetTokens));
                    }

                    showAlert('Password has been reset successfully! Redirecting to login...', 'success');
                    
                    // Redirect to login after delay
                    setTimeout(() => {
                        window.location.href = 'login.html?message=Password reset successfully!&type=success';
                    }, 2000);
                } else {
                    showAlert(result.message || 'Failed to reset password. Please try again.', 'error');
                }

            } catch (error) {
                console.error('Password reset error:', error);
                showAlert('An error occurred while resetting your password. Please try again.', 'error');
            } finally {
                // Restore button state
                btn.disabled = false;
                btnText.textContent = 'Reset Password';
                btnIcon.className = 'fas fa-key';
            }
        });

        // Initialize page
        window.addEventListener('load', function() {
            checkResetToken();
        });
    </script>
</body>
</html>
