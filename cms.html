<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CMS Access</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <style>
    body { background: linear-gradient(135deg,#25316d 0%,#1e2a59 48%,#0f152d 100%); color:#f4f7ff; min-height:100vh; margin:0; font-family:Arial,Helvetica,sans-serif; }
    .cms-card { max-width:420px; margin:80px auto; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:24px; padding:32px; box-shadow:0 24px 80px rgba(0,0,0,.28); }
    .cms-card h1 { margin:0 0 16px; font-size:2rem; letter-spacing:0.03em; }
    .cms-card p { color:#d8e1ff; margin:0 0 24px; line-height:1.6; }
    .cms-input, .cms-button { width:100%; box-sizing:border-box; border-radius:14px; font-size:0.98rem; }
    .cms-input { padding:12px 14px; height:48px; border:1px solid rgba(255,255,255,.18); background:rgba(255,255,255,.08); color:#fff; margin-bottom:16px; }
    .cms-button { display:block; padding:0 14px; height:48px; line-height:48px; border:none; font-size:1rem; cursor:pointer; background:linear-gradient(90deg,#6a82fb,#fc5c7d); color:#fff; transition:transform .16s ease,box-shadow .16s ease; }
    .cms-button:hover { transform:translateY(-1px); box-shadow:0 16px 32px rgba(252,92,125,.22); }
    .cms-small { color:#a9b9ff; font-size:.95rem; margin-top:20px; }
    .cms-error { color:#ff9aa8; margin:0 0 14px; min-height:24px; }
  </style>
</head>
<body>
  <div class="cms-card">
    <h1>CMS Access</h1>
    <p>Enter the private CMS password to continue. Only authorized users may access the content management dashboard.</p>
    <div class="cms-error" id="cmsError"></div>
    <input id="cmsPassword" class="cms-input" type="password" placeholder="Enter CMS password" autocomplete="off" />
    <button class="cms-button" onclick="loginCms()">Unlock CMS</button>
    <div class="cms-small">Password is case sensitive. Use the secret key stored only with you.</div>
  </div>
  <script>
    function loginCms(){
      const password = document.getElementById('cmsPassword').value.trim();
      if(password === 'Shubham_@14123'){
        sessionStorage.setItem('cmsAuth','authorized');
        window.location.href = 'cms/';
      } else {
        document.getElementById('cmsError').innerText = 'Incorrect password. Please try again.';
      }
    }
    document.getElementById('cmsPassword').addEventListener('keydown', function(e){ if(e.key==='Enter'){ loginCms(); }});
  </script>
</body>
</html>
