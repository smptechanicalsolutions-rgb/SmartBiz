<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailJS Test - SmartBiz Invoice</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .test-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .test-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .test-header i {
            font-size: 3rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .test-header h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .test-header p {
            color: #666;
            font-size: 1rem;
        }

        .test-form {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .test-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .test-btn {
            padding: 15px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .test-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .test-btn.secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .test-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .test-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .status-message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .credentials-display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .credentials-display h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .credential-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .credential-item:last-child {
            border-bottom: none;
        }

        .credential-label {
            font-weight: 500;
            color: #666;
        }

        .credential-value {
            font-family: monospace;
            color: #333;
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .test-buttons {
                grid-template-columns: 1fr;
            }
            
            .test-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <i class="fas fa-envelope"></i>
            <h1>EmailJS Test Page</h1>
            <p>Test your EmailJS configuration and send test emails</p>
        </div>

        <div id="statusMessage" class="status-message"></div>

        <div class="credentials-display">
            <h3><i class="fas fa-key"></i> EmailJS Configuration</h3>
            <div class="credential-item">
                <span class="credential-label">Service ID:</span>
                <span class="credential-value">service_x34y97v</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Template ID:</span>
                <span class="credential-value">template_db5d01s</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Public Key:</span>
                <span class="credential-value">jf790Ir3eE3esib-d</span>
            </div>
            <div class="credential-item">
                <span class="credential-label">Admin Email:</span>
                <span class="credential-value">shubp2008@gmail.com</span>
            </div>
        </div>

        <form class="test-form" id="testForm">
            <div class="form-group">
                <label for="testName">Your Name</label>
                <input type="text" id="testName" name="testName" required placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label for="testEmail">Your Email</label>
                <input type="email" id="testEmail" name="testEmail" required placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="testMessage">Test Message</label>
                <textarea id="testMessage" name="testMessage" required placeholder="Enter your test message"></textarea>
            </div>
        </form>

        <div class="test-buttons">
            <button type="button" class="test-btn primary" onclick="sendTestEmail()">
                <i class="fas fa-paper-plane"></i>
                Send Test Email
            </button>
            <button type="button" class="test-btn secondary" onclick="sendAdminNotification()">
                <i class="fas fa-bell"></i>
                Test Admin Notification
            </button>
        </div>

        <div class="test-buttons">
            <button type="button" class="test-btn secondary" onclick="testAccountCreation()">
                <i class="fas fa-user-plus"></i>
                Test Account Creation
            </button>
            <button type="button" class="test-btn secondary" onclick="testUserLogin()">
                <i class="fas fa-sign-in-alt"></i>
                Test User Login
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="assets/js/email-service.js"></script>
    <script>
        // Initialize EmailJS with your credentials
        (function() {
            emailjs.init("jf790Ir3eE3esib-d");
        })();

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status-message ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }

        async function sendTestEmail() {
            const name = document.getElementById('testName').value;
            const email = document.getElementById('testEmail').value;
            const message = document.getElementById('testMessage').value;

            if (!name || !email || !message) {
                showStatus('Please fill in all fields', 'error');
                return;
            }

            try {
                const templateParams = {
                    to_name: name,
                    to_email: email,
                    from_name: 'SmartBiz Test',
                    subject: 'Test Email from SmartBiz',
                    message: message
                };

                const response = await emailjs.send('service_x34y97v', 'template_db5d01s', templateParams);
                showStatus('✅ Test email sent successfully! Check your inbox.', 'success');
                
                // Clear form
                document.getElementById('testForm').reset();
                
            } catch (error) {
                console.error('EmailJS Error:', error);
                showStatus('❌ Failed to send email: ' + error.text, 'error');
            }
        }

        async function sendAdminNotification() {
            try {
                const templateParams = {
                    to_email: 'shubp2008@gmail.com',
                    to_name: 'Admin',
                    from_name: 'SmartBiz Test System',
                    subject: '🧪 Test Admin Notification',
                    message: `
                        🧪 TEST ADMIN NOTIFICATION 🧪

                        This is a test admin notification from SmartBiz Invoice System.

                        Test Details:
                        • Time: ${new Date().toLocaleString()}
                        • Purpose: Testing admin notification system
                        • Status: Working correctly!

                        If you receive this email, your EmailJS configuration is working perfectly.
                    `
                };

                const response = await emailjs.send('service_x34y97v', 'template_db5d01s', templateParams);
                showStatus('✅ Admin notification sent to shubp2008@gmail.com!', 'success');
                
            } catch (error) {
                console.error('Admin Notification Error:', error);
                showStatus('❌ Failed to send admin notification: ' + error.text, 'error');
            }
        }

        async function testAccountCreation() {
            try {
                const result = await emailService.sendAdminNewAccountNotification(
                    'testuser@example.com',
                    'Test User',
                    new Date().toISOString()
                );
                
                if (result.success) {
                    showStatus('✅ Account creation notification sent to admin!', 'success');
                } else {
                    showStatus('⚠️ ' + result.message, 'error');
                }
            } catch (error) {
                console.error('Account Creation Test Error:', error);
                showStatus('❌ Failed to test account creation notification', 'error');
            }
        }

        async function testUserLogin() {
            try {
                const result = await emailService.sendAdminLoginNotification(
                    'testuser@example.com',
                    'Test User',
                    new Date().toISOString()
                );
                
                if (result.success) {
                    showStatus('✅ User login notification sent to admin!', 'success');
                } else {
                    showStatus('⚠️ ' + result.message, 'error');
                }
            } catch (error) {
                console.error('User Login Test Error:', error);
                showStatus('❌ Failed to test user login notification', 'error');
            }
        }

        // Check if EmailJS is loaded
        window.addEventListener('load', function() {
            if (typeof emailjs !== 'undefined') {
                showStatus('✅ EmailJS loaded successfully! Ready to test.', 'success');
            } else {
                showStatus('❌ EmailJS failed to load. Check your internet connection.', 'error');
            }
        });
    </script>
</body>
</html>
