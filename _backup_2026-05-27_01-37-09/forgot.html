<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Invoice Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .forgot-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 50px;
            max-width: 500px;
            width: 100%;
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .forgot-header i {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .forgot-header h1 {
            color: #333;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .forgot-header p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 1rem;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .forgot-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .forgot-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .forgot-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #5a67d8;
            text-decoration: underline;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 500;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .forgot-container {
                padding: 30px 20px;
                margin: 20px;
            }

            .forgot-header h1 {
                font-size: 2rem;
            }

            .forgot-header i {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <i class="fas fa-key"></i>
            <h1>Forgot Password</h1>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
        </div>

        <div id="forgotError" class="alert alert-danger"></div>
        <div id="forgotSuccess" class="alert alert-success"></div>
        <div id="forgotInfo" class="alert alert-info"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email address" autocomplete="email">
            </div>

            <button type="submit" id="forgotBtn" class="forgot-btn">
                <i class="fas fa-paper-plane"></i>
                <span>Send Reset Link</span>
            </button>
        </form>

        <div class="back-link">
            <a href="login.html">
                <i class="fas fa-arrow-left"></i>
                Back to Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="js/auth-service.js"></script>
    <script src="js/email-service.js"></script>
    <script>
        // Initialize EmailJS
        (function() {
            emailjs.init("jf790Ir3eE3esib-d");
        })();

        function showAlert(message, type) {
            // Hide all alerts
            document.getElementById('forgotError').style.display = 'none';
            document.getElementById('forgotSuccess').style.display = 'none';
            document.getElementById('forgotInfo').style.display = 'none';

            // Show the specific alert
            const alertElement = document.getElementById('forgot' + type.charAt(0).toUpperCase() + type.slice(1));
            alertElement.textContent = message;
            alertElement.style.display = 'block';

            // Auto hide success/info messages after 5 seconds
            if (type === 'success' || type === 'info') {
                setTimeout(() => {
                    alertElement.style.display = 'none';
                }, 5000);
            }
        }

        function generateResetToken() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);
        }

        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('forgotBtn');
            const btnText = btn.querySelector('span');
            const btnIcon = btn.querySelector('i');

            // Validate email
            if (!email) {
                showAlert('Please enter your email address', 'error');
                return;
            }

            // Show loading state
            btn.disabled = true;
            btnText.textContent = 'Sending...';
            btnIcon.className = 'spinner';

            try {
                // Check if user exists
                const user = authService.findUserByEmail(email);
                
                if (!user) {
                    // Don't reveal that user doesn't exist for security
                    showAlert('If an account with this email exists, a reset link has been sent.', 'info');
                    return;
                }

                // Generate reset token
                const resetToken = generateResetToken();
                const resetLink = `${window.location.origin}/reset-password.html?token=${resetToken}&email=${encodeURIComponent(email)}`;

                // Store reset token in localStorage (in production, this would be in a database)
                const resetTokens = JSON.parse(localStorage.getItem('passwordResetTokens') || '{}');
                resetTokens[email] = {
                    token: resetToken,
                    timestamp: Date.now(),
                    used: false
                };
                localStorage.setItem('passwordResetTokens', JSON.stringify(resetTokens));

                // Send password reset email using EmailJS
                const emailResult = await emailService.sendPasswordResetEmail(email, resetToken);

                if (emailResult.success) {
                    showAlert('Password reset link has been sent to your email. Please check your inbox.', 'success');
                    
                    // Clear form
                    document.getElementById('email').value = '';
                    
                    // Redirect to login after delay
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showAlert('Failed to send reset email. Please try again.', 'error');
                }

            } catch (error) {
                console.error('Password reset error:', error);
                showAlert('An error occurred while processing your request. Please try again.', 'error');
            } finally {
                // Restore button state
                btn.disabled = false;
                btnText.textContent = 'Send Reset Link';
                btnIcon.className = 'fas fa-paper-plane';
            }
        });

        // Check URL parameters for any messages
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const message = urlParams.get('message');
            const type = urlParams.get('type');

            if (message && type) {
                showAlert(decodeURIComponent(message), type);
            }
        });
    </script>
</body>
</html>
