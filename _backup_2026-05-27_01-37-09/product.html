<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - SmartBiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/navigation-manager.js"></script>
    <script src="js/currency.js"></script><script src="js/auth-service.js"></script>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Main Container - Uses full viewport height */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
        }

        /* Header Section */
        .header {
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            color: white;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #1a252f;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
            white-space: nowrap;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .header-right > * {
            white-space: nowrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            text-decoration: none;
            font-weight: 500;
            color: white;
            background: rgba(255, 255, 255, 0.12);
            transition: background 0.25s ease, transform 0.25s ease;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.18);
            transform: translateY(-1px);
        }

        .btn.btn-gradient {
            background: linear-gradient(90deg, #5f9df7 0%, #5ed2b8 100%);
            color: white;
        }

        .page-login-btn {
            min-width: max-content;
        }

        .business-card-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .business-card-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Main Layout Container */
        .main-layout {
            display: flex;
            flex: 1;
            width: 100%;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f8f9fa;
        }

        /* Sidebar - Fixed Width */
        .sidebar {
            width: 300px; /* Increased width for more space */
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
            flex-shrink: 0; /* Prevent sidebar from shrinking */
            overflow-y: auto; /* Allow sidebar to scroll if needed */
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .company-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
            color: white;
        }

        .company-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .company-tagline {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border-left: 3px solid transparent;
        }

        .sidebar-nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .sidebar-nav-item.active {
            background: #667eea;
            color: white;
        }

        .sidebar-nav-item i {
            width: 20px;
            text-align: center;
        }

        /* Equal size for all sidebar items */
        .sidebar-nav-item {
            padding: 14px 20px;
            min-height: 50px;
        }

        /* Different colors for each sidebar item */
        .sidebar-nav-item:nth-child(1) { /* Home */
            border-left-color: #e74c3c;
            background: linear-gradient(90deg, rgba(231, 76, 60, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(2) { /* Dashboard */
            border-left-color: #3498db;
            background: linear-gradient(90deg, rgba(52, 152, 219, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(3) { /* Items */
            border-left-color: #f39c12;
            background: linear-gradient(90deg, rgba(243, 156, 18, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(4) { /* Menu */
            border-left-color: #27ae60;
            background: linear-gradient(90deg, rgba(39, 174, 96, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(5) { /* Invoice */
            border-left-color: #667eea;
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(6) { /* Delivery Challan */
            border-left-color: #e67e22;
            background: linear-gradient(90deg, rgba(230, 126, 34, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(7) { /* Quotation */
            border-left-color: #f093fb;
            background: linear-gradient(90deg, rgba(240, 147, 251, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(8) { /* Propharma Invoice */
            border-left-color: #4facfe;
            background: linear-gradient(90deg, rgba(79, 172, 254, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(9) { /* All Transactions */
            border-left-color: #fd7e14;
            background: linear-gradient(90deg, rgba(253, 126, 34, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(10) { /* Business Card */
            border-left-color: #764ba2;
            background: linear-gradient(90deg, rgba(118, 75, 162, 0.1) 0%, transparent 100%);
        }

        .sidebar-nav-item:nth-child(11) { /* Settings */
            border-left-color: #e74c3c;
            background: linear-gradient(90deg, rgba(231, 76, 60, 0.1) 0%, transparent 100%);
        }

        /* Hover states for colored sidebar items */
        .sidebar-nav-item:hover {
            transform: translateX(3px);
        }

        .sidebar-nav-item:nth-child(1):hover { /* Home */
            background: linear-gradient(90deg, rgba(231, 76, 60, 0.2) 0%, transparent 100%);
            border-left-color: #e74c3c;
            color: #e74c3c;
        }

        .sidebar-nav-item:nth-child(2):hover { /* Dashboard */
            background: linear-gradient(90deg, rgba(52, 152, 219, 0.2) 0%, transparent 100%);
            border-left-color: #3498db;
            color: #3498db;
        }

        .sidebar-nav-item:nth-child(3):hover { /* Items */
            background: linear-gradient(90deg, rgba(243, 156, 18, 0.2) 0%, transparent 100%);
            border-left-color: #f39c12;
            color: #f39c12;
        }

        .sidebar-nav-item:nth-child(4):hover { /* Menu */
            background: linear-gradient(90deg, rgba(39, 174, 96, 0.2) 0%, transparent 100%);
            border-left-color: #27ae60;
            color: #27ae60;
        }

        .sidebar-nav-item:nth-child(5):hover { /* Invoice */
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.2) 0%, transparent 100%);
            border-left-color: #667eea;
            color: #667eea;
        }

        .sidebar-nav-item:nth-child(6):hover { /* Delivery Challan */
            background: linear-gradient(90deg, rgba(230, 126, 34, 0.2) 0%, transparent 100%);
            border-left-color: #e67e22;
            color: #e67e22;
        }

        .sidebar-nav-item:nth-child(7):hover { /* Quotation */
            background: linear-gradient(90deg, rgba(240, 147, 251, 0.2) 0%, transparent 100%);
            border-left-color: #f093fb;
            color: #f093fb;
        }

        .sidebar-nav-item:nth-child(8):hover { /* Propharma Invoice */
            background: linear-gradient(90deg, rgba(79, 172, 254, 0.2) 0%, transparent 100%);
            border-left-color: #4facfe;
            color: #4facfe;
        }

        .sidebar-nav-item:nth-child(9):hover { /* All Transactions */
            background: linear-gradient(90deg, rgba(253, 126, 34, 0.2) 0%, transparent 100%);
            border-left-color: #fd7e14;
            color: #fd7e14;
        }

        .sidebar-nav-item:nth-child(10):hover { /* Business Card */
            background: linear-gradient(90deg, rgba(118, 75, 162, 0.2) 0%, transparent 100%);
            border-left-color: #764ba2;
            color: #764ba2;
        }

        .sidebar-nav-item:nth-child(11):hover { /* Settings */
            background: linear-gradient(90deg, rgba(231, 76, 60, 0.2) 0%, transparent 100%);
            border-left-color: #e74c3c;
            color: #e74c3c;
        }

        /* Main Content - Takes All Remaining Space */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f6fa;
            overflow-y: auto;
        }

        .content-header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .content-actions {
            display: flex;
            gap: 10px;
        }

        .action-button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .action-button.secondary {
            background: #f8f9fa;
            color: #2c3e50;
            border: 1px solid #e0e0e0;
        }

        .action-button {
            background: #667eea;
            color: white;
        }

        .content-area {
            padding: 30px;
            flex: 1;
        }

        /* Product Management Styles */
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .product-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .add-product-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s ease;
        }

        .add-product-btn:hover {
            background: #218838;
        }

        .product-search {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .inventory-summary {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 16px;
            margin-bottom: 22px;
        }

        .inventory-stat {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
        }

        .inventory-stat-label {
            color: #64748b;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .inventory-stat-value {
            color: #1f2937;
            font-size: 1.45rem;
            font-weight: 800;
        }

        .inventory-stat.warning .inventory-stat-value {
            color: #b45309;
        }

        .inventory-stat.danger .inventory-stat-value {
            color: #b91c1c;
        }

        .search-form {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .search-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }

        .search-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .search-btn:hover {
            background: #5a6fd8;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 3rem;
            color: #667eea;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 700;
            color: #28a745;
            margin-bottom: 8px;
        }

        .product-stock {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
        }

        .product-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .product-chip {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            color: #475569;
            font-size: 0.78rem;
            padding: 4px 7px;
        }

        .stock-badge {
            border-radius: 4px;
            display: inline-block;
            font-size: 0.78rem;
            font-weight: 700;
            padding: 4px 8px;
        }

        .stock-badge.in {
            background: #dcfce7;
            color: #166534;
        }

        .stock-badge.low {
            background: #fef3c7;
            color: #92400e;
        }

        .stock-badge.out {
            background: #fee2e2;
            color: #991b1b;
        }

        .empty-inventory {
            background: #fff;
            border: 1px dashed #cbd5e1;
            border-radius: 8px;
            color: #64748b;
            padding: 36px;
            text-align: center;
            grid-column: 1 / -1;
        }

        .product-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .edit-btn, .delete-btn, .adjust-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .adjust-btn {
            background: #f59e0b;
            color: white;
        }

        .adjust-btn:hover {
            background: #d97706;
        }

        .edit-btn {
            background: #667eea;
            color: white;
        }

        .edit-btn:hover {
            background: #5a6fd8;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1rem;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .save-btn, .cancel-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .save-btn {
            background: #28a745;
            color: white;
        }

        .save-btn:hover {
            background: #218838;
        }

        .cancel-btn {
            background: #6c757d;
            color: white;
        }

        .cancel-btn:hover {
            background: #5a6268;
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: none;
        }

        /* Mobile Header Styles */
        .header-center {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mobile-search-container {
            position: relative;
            width: 100%;
            max-width: 300px;
        }

        .mobile-search-input {
            width: 100%;
            padding: 8px 35px 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .mobile-search-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .mobile-search-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .mobile-search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        .hamburger-menu {
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .hamburger-menu:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Mobile Menu Overlay */
        .mobile-menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .mobile-menu-overlay.active {
            display: block;
            opacity: 1;
        }

        /* Mobile Menu */
        .mobile-menu {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            z-index: 9999;
            transition: left 0.3s ease;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3);
        }

        .mobile-menu.active {
            left: 0;
        }

        .mobile-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        .mobile-menu-header h3 {
            color: white;
            font-size: 1.2rem;
            margin: 0;
        }

        .close-menu {
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .close-menu:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mobile-menu-items {
            padding: 20px 0;
        }

        .mobile-menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: white;
            cursor: pointer;
            transition: background 0.3s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mobile-menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .mobile-menu-item i {
            width: 20px;
            margin-right: 15px;
            font-size: 16px;
            opacity: 0.9;
        }

        .mobile-menu-item span {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* Mobile Responsive Design */
        @media (max-width: 768px) {
            .header {
                height: 50px;
                padding: 0 15px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .header-left {
                display: flex;
                align-items: center;
            }

            .header-center {
                flex: 1;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .header-right {
                display: none; /* Hide right side completely */
            }

            .mobile-search-container {
                max-width: 250px;
            }

            .header-left .mobile-menu-toggle,
            .header-left .back-icon {
                display: none; /* Hide original mobile elements */
            }

    <script>
        // Enhanced Navigation Functions
        function navigateTo(page) {

            setTimeout(() => {

                        break;
                    case 'propharma':

                        window.location.href = 'propharma-invoice.html';
                        break;
                    case 'transactions':
                        showTransactionModal();
                        break;
                    case 'business-card':

                        break;
                    case 'settings':

                        break;

                        break;

                    case 'menu':

                    default:
                        console.log(`Page ${page} not found`);
                }
            }, 300);
            
            // For mobile, close sidebar after navigation
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
            }
        }

        // Loading Functions
        function showLoading() {
            const loadingHtml = '<div class="loading-overlay"><div class="loading-spinner"></div></div>';
            document.body.insertAdjacentHTML('beforeend', loadingHtml);
        }

        function hideLoading() {
            const loadingOverlay = document.querySelector('.loading-overlay');
            if (loadingOverlay) {
                loadingOverlay.remove();
            }
        }

        function goBack() {
            window.history.back();
        }

        function goToPersonalInfo() {
            window.location.href = 'personal-info.html';
        }

        function goToSettings() {
            window.location.href = 'settings.html';
        }

        function refreshData() {
            renderInventory();
        }

        function exportData() {
            const products = getProducts();
            if (!products.length) {
                alert('No products to export.');
                return;
            }

            const header = ['SKU', 'Name', 'Category', 'HSN/SAC', 'Stock', 'Low Stock Alert', 'Rate', 'Value', 'Description'];
            const rows = products.map(product => [
                product.sku || '',
                product.name || '',
                product.category || '',
                product.hsn || '',
                product.stock || 0,
                product.lowStock || 0,
                product.price || 0,
                (Number(product.stock || 0) * Number(product.price || 0)).toFixed(2),
                product.description || ''
            ]);
            const csv = [header, ...rows]
                .map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(','))
                .join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `inventory_${new Date().toISOString().slice(0, 10)}.csv`;
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(url);
        }

        const INVENTORY_KEY = 'products';

        function getProducts() {
            try {
                return JSON.parse(localStorage.getItem(INVENTORY_KEY) || '[]');
            } catch (error) {
                return [];
            }
        }

        const TRANSACTIONS_KEY = 'inventoryTransactions';

        function saveProducts(products) {
            localStorage.setItem(INVENTORY_KEY, JSON.stringify(products));
        }

        function getTransactions() {
            try {
                return JSON.parse(localStorage.getItem(TRANSACTIONS_KEY) || '[]');
            } catch (error) {
                return [];
            }
        }

        function saveTransactions(transactions) {
            localStorage.setItem(TRANSACTIONS_KEY, JSON.stringify(transactions));
        }

        function recordTransaction(productId, type, quantity, note) {
            const products = getProducts();
            const product = products.find(item => item.id === productId);
            if (!product) return;
            const transactions = getTransactions();
            transactions.unshift({
                id: Date.now(),
                productId,
                sku: product.sku || '',
                name: product.name || '',
                type,
                quantity,
                note: note || '',
                timestamp: new Date().toISOString()
            });
            saveTransactions(transactions);
        }

        function formatMoney(value) {
            if (window.SmarbizCurrency) {
                return SmarbizCurrency.format(value, { decimals: 2 });
            }
            return `Rs. ${Number(value || 0).toFixed(2)}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function seedInventoryIfNeeded() {
            if (localStorage.getItem(INVENTORY_KEY)) return;
            saveProducts([
                { id: 1, sku: 'TEST-SKU-001', name: 'Test Product (Inventory)', category: 'Demo', supplier: 'SmartBiz', unit: 'pcs', hsn: '8471', stock: 10, lowStock: 2, price: 1500, description: 'Sample product for testing inventory � safe to edit or delete.' }
            ]);
        }

        function getStockState(product) {
            const stock = Number(product.stock || 0);
            const low = Number(product.lowStock || 0);
            if (stock <= 0) return { key: 'outofstock', label: 'Out of stock', className: 'out' };
            if (stock <= low) return { key: 'lowstock', label: 'Low stock', className: 'low' };
            return { key: 'instock', label: 'In stock', className: 'in' };
        }

        function adjustStock(productId, direction) {
            const product = getProducts().find(item => item.id === productId);
            if (!product) return;
            const action = direction === 'in' ? 'add to' : 'remove from';
            const amount = prompt(`Enter quantity to ${action} stock for ${product.name}:`);
            if (!amount) return;
            const qty = Number(amount);
            if (!Number.isFinite(qty) || qty <= 0) {
                alert('Please enter a valid positive quantity.');
                return;
            }

            const products = getProducts();
            const index = products.findIndex(item => item.id === productId);
            if (index === -1) return;

            if (direction === 'in') {
                products[index].stock = Number(products[index].stock || 0) + qty;
                recordTransaction(productId, 'Stock In', qty, `Received stock`);
            } else {
                if (Number(products[index].stock || 0) < qty) {
                    if (!confirm('Quantity is larger than current stock. Continue and allow negative stock?')) {
                        return;
                    }
                }
                products[index].stock = Number(products[index].stock || 0) - qty;
                recordTransaction(productId, 'Stock Out', qty, `Issued stock`);
            }

            saveProducts(products);
            renderInventory();
        }

        function showTransactionModal() {
            const modal = document.getElementById('transactionModal');
            if (!modal) return;
            modal.style.display = 'flex';
            renderTransactionHistory();
        }

        function closeTransactionModal() {
            const modal = document.getElementById('transactionModal');
            if (!modal) return;
            modal.style.display = 'none';
        }

        function renderTransactionHistory() {
            const transactions = getTransactions();
            const searchValue = (document.getElementById('transactionSearchInput')?.value || '').trim().toLowerCase();
            const container = document.getElementById('transactionHistoryList');
            if (!container) return;

            const filtered = transactions.filter(txn => {
                const text = `${txn.sku} ${txn.name} ${txn.type} ${txn.note}`.toLowerCase();
                return !searchValue || text.includes(searchValue);
            });

            if (!filtered.length) {
                container.innerHTML = '<div style="padding:20px; color:#555;">No stock movements recorded yet.</div>';
                return;
            }

            container.innerHTML = filtered.map(txn => {
                const date = new Date(txn.timestamp).toLocaleString();
                return `
                    <div style="border-bottom:1px solid #e5e7eb; padding:14px 0;">
                        <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; font-weight:600; color:#111827;">
                            <div>${escapeHtml(txn.name)} (${escapeHtml(txn.sku)})</div>
                            <div style="color:${txn.type === 'Stock In' ? '#16a34a' : '#dc2626'}">${escapeHtml(txn.type)}</div>
                        </div>
                        <div style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; margin-top:8px; color:#475569; font-size:0.95rem;">
                            <div>Qty: ${escapeHtml(String(txn.quantity))}</div>
                            <div>${escapeHtml(txn.note)}</div>
                            <div>${date}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateCategoryFilter(products) {
            const select = document.getElementById('categoryFilter');
            if (!select) return;
            const current = select.value || 'all';
            const categories = [...new Set(products.map(p => (p.category || 'Other').trim() || 'Other'))].sort();
            select.innerHTML = '<option value="all">All Categories</option>' +
                categories.map(category => `<option value="${escapeHtml(category.toLowerCase())}">${escapeHtml(category)}</option>`).join('');
            select.value = [...select.options].some(option => option.value === current) ? current : 'all';
        }

        function renderInventory() {
            const products = getProducts();
            updateCategoryFilter(products);
            updateInventoryStats(products);
            renderProducts(products);
        }

        function updateInventoryStats(products) {
            const totalValue = products.reduce((sum, product) => sum + (Number(product.stock || 0) * Number(product.price || 0)), 0);
            document.getElementById('totalItems').textContent = products.length;
            document.getElementById('inventoryValue').textContent = formatMoney(totalValue);
            document.getElementById('lowStockCount').textContent = products.filter(product => getStockState(product).key === 'lowstock').length;
            document.getElementById('outStockCount').textContent = products.filter(product => getStockState(product).key === 'outofstock').length;
        }

        function renderProducts(products) {
            const grid = document.getElementById('productGrid');
            if (!grid) return;

            const searchTerm = (document.getElementById('productSearchInput')?.value || document.getElementById('mobileSearchInput')?.value || '').trim().toLowerCase();
            const category = document.getElementById('categoryFilter')?.value || 'all';
            const stockFilter = document.getElementById('stockFilter')?.value || 'all';
            const filtered = products.filter(product => {
                const state = getStockState(product).key;
                const text = `${product.sku || ''} ${product.name || ''} ${product.category || ''} ${product.hsn || ''} ${product.description || ''}`;
                const matchesSearch = !searchTerm || searchMatches(text, searchTerm);
                const matchesCategory = category === 'all' || (product.category || 'Other').toLowerCase() === category;
                const matchesStock = stockFilter === 'all' || state === stockFilter;
                return matchesSearch && matchesCategory && matchesStock;
            });

            if (!filtered.length) {
                grid.innerHTML = '<div class="empty-inventory">No inventory items match the current filters.</div>';
                return;
            }

            grid.innerHTML = filtered.map(product => {
                const state = getStockState(product);
                const value = Number(product.stock || 0) * Number(product.price || 0);
                return `
                    <div class="product-card product-item">
                        <div class="product-image"><i class="fas fa-box"></i></div>
                        <h3 class="product-name">${escapeHtml(product.name)}</h3>
                        <div class="product-price">${formatMoney(product.price)}</div>
                        <div class="product-meta">
                            <span class="product-chip">${escapeHtml(product.sku || 'No SKU')}</span>
                            <span class="product-chip">${escapeHtml(product.category || 'Other')}</span>
                            ${product.unit ? `<span class="product-chip">${escapeHtml(product.unit)}</span>` : ''}
                            ${product.supplier ? `<span class="product-chip">${escapeHtml(product.supplier)}</span>` : ''}
                            ${product.hsn ? `<span class="product-chip">HSN ${escapeHtml(product.hsn)}</span>` : ''}
                        </div>
                        <div class="product-stock">Stock: ${Number(product.stock || 0)} units | Value: ${formatMoney(value)}</div>
                        <div style="margin-bottom: 12px;"><span class="stock-badge ${state.className}">${state.label}</span></div>
                        ${product.description ? `<div class="product-stock">${escapeHtml(product.description)}</div>` : ''}
                        <div class="product-actions">
                            <button class="adjust-btn" onclick="adjustStock(${product.id}, 'in')"><i class="fas fa-plus"></i> + Stock</button>
                            <button class="adjust-btn" onclick="adjustStock(${product.id}, 'out')"><i class="fas fa-minus"></i> - Stock</button>
                            <button class="edit-btn" onclick="editProduct(${product.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="delete-btn" onclick="deleteProduct(${product.id})"><i class="fas fa-trash"></i> Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Product management functions
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Product';
            document.getElementById('productForm').reset();
            document.getElementById('modalProductId').value = '';
            document.getElementById('modalProductLowStock').value = 10;
            document.getElementById('productModal').style.display = 'flex';
        }

        function editProduct(id) {
            const product = getProducts().find(item => item.id === id);
            if (!product) return;
            document.getElementById('modalTitle').textContent = 'Edit Product';
            document.getElementById('modalProductId').value = product.id;
            document.getElementById('modalProductName').value = product.name || '';
            document.getElementById('modalProductSku').value = product.sku || '';
            document.getElementById('modalProductSupplier').value = product.supplier || '';
            document.getElementById('modalProductUnit').value = product.unit || '';
            document.getElementById('modalProductPrice').value = product.price || 0;
            document.getElementById('modalProductStock').value = product.stock || 0;
            document.getElementById('modalProductLowStock').value = product.lowStock || 10;
            document.getElementById('modalProductCategory').value = product.category || '';
            document.getElementById('modalProductHsn').value = product.hsn || '';
            document.getElementById('modalProductDescription').value = product.description || '';
            document.getElementById('productModal').style.display = 'flex';
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                saveProducts(getProducts().filter(product => product.id !== id));
                renderInventory();
            }
        }

        function closeModal() {
            document.getElementById('productModal').style.display = 'none';
        }

        function searchProducts() {
            renderProducts(getProducts());
        }

        function filterProducts() {
            renderProducts(getProducts());
        }

        // Form submission
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('modalProductId').value;
            const products = getProducts();
            const product = {
                id: id ? Number(id) : Date.now(),
                name: document.getElementById('modalProductName').value.trim(),
                sku: document.getElementById('modalProductSku').value.trim(),
                supplier: document.getElementById('modalProductSupplier').value.trim(),
                unit: document.getElementById('modalProductUnit').value.trim(),
                price: Number(document.getElementById('modalProductPrice').value || 0),
                stock: Number(document.getElementById('modalProductStock').value || 0),
                lowStock: Number(document.getElementById('modalProductLowStock').value || 0),
                category: document.getElementById('modalProductCategory').value.trim() || 'Other',
                hsn: document.getElementById('modalProductHsn').value.trim(),
                description: document.getElementById('modalProductDescription').value.trim(),
                updatedAt: new Date().toISOString()
            };

            if (!product.name || product.price < 0 || product.stock < 0) {
                alert('Please enter a product name, non-negative price, and non-negative stock.');
                return;
            }

            const existingIndex = products.findIndex(item => item.id === product.id);
            if (existingIndex >= 0) {
                products[existingIndex] = { ...products[existingIndex], ...product };
            } else {
                products.unshift({ ...product, createdAt: new Date().toISOString() });
            }

            saveProducts(products);
            renderInventory();
            closeModal();
        });

        // Highlight correct footer nav item on page load
        function markActiveFooter() {
            const page = window.location.pathname.split('/').pop().toLowerCase();
            document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
                item.classList.remove('active');
                const text = item.querySelector('span')?.textContent?.toLowerCase() || '';
                if (page.includes('product') && text.includes('items')) {
                    item.classList.add('active');
                }
            });
        }

        // Highlight correct sidebar nav item on page load
        function markActiveSidebar() {
            const page = window.location.pathname.split('/').pop().toLowerCase();
            document.querySelectorAll('.sidebar-nav-item').forEach(item => {
                item.classList.remove('active');
                const text = item.querySelector('span')?.textContent?.toLowerCase() || '';
                if (page.includes('product') && text.includes('items')) {
                    item.classList.add('active');
                }
            });
        }

        // Mobile Menu Functions
        function toggleMobileMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
            
            mobileMenu.classList.toggle('active');
            mobileMenuOverlay.classList.toggle('active');
        }

        function closeMobileMenu() {
            const mobileMenu = document.getElementById('mobileMenu');
            const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
            
            mobileMenu.classList.remove('active');
            mobileMenuOverlay.classList.remove('active');
        }

        // Mobile Search Function
        function mobileSearchInvoices() {
            renderProducts(getProducts());
        }

        // Mobile Menu Navigation Functions
        function goToAccount() {

            // You can implement actual navigation here
        }

        function goToSettings() {
            closeMobileMenu();
            navigateTo('settings');
        }

        function goToNotifications() {
            closeMobileMenu();
            alert('Opening Notifications...');
            // You can implement actual navigation here
        }

        function goToPersonalization() {
            closeMobileMenu();
            alert('Opening Personalization settings...');
            // You can implement actual navigation here
        }

        function goToLogin() {
            closeMobileMenu();
            window.location.href = 'login.html?redirect=product.html';
        }

        function goToAutoSaveSettings() {
            closeMobileMenu();
            alert('Opening Auto-Save Settings...');
            // You can implement actual navigation here
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            seedInventoryIfNeeded();
            renderInventory();
            markActiveFooter();
            markActiveSidebar();
            
            // Update authentication UI
            if (typeof updateAuthUI === 'function') {
                updateAuthUI();
            }
        });
    </script>

</body>
