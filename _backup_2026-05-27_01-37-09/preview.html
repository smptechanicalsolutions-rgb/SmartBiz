<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Invoice Preview / History</title>
<link rel="stylesheet" href="css/style.css">
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>
<style>
  body {
    background: #f4f6f8;
    padding: 10px;
  }

  #history-container {
    max-width: 1200px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  #history-container h2 {
    margin-bottom: 20px;
    font-size: 1.75rem;
  }

  .history-table {
    width: 100%;
    border-collapse: collapse;
    overflow-x: auto;
    display: block;
  }

  .history-table thead,
  .history-table tbody,
  .history-table tr {
    display: table;
    width: 100%;
    table-layout: fixed;
  }

  .history-table th,
  .history-table td {
    padding: 12px;
    text-align: left;
    border: 1px solid #ddd;
    word-wrap: break-word;
  }

  .history-table th {
    background: #0a4b78;
    color: white;
    font-weight: 600;
  }

  .history-table td {
    background: white;
  }

  .history-table .action-buttons {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .history-table .action-buttons button {
    padding: 6px 12px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }

  .history-table .action-buttons button:first-child {
    background: #0a4b78;
    color: white;
  }

  .history-table .action-buttons button:last-child {
    background: #dc3545;
    color: white;
  }

  #invoice-container {
    max-width: 100%;
    margin: 0 auto;
  }

  @media (max-width: 768px) {
    body {
      padding: 5px;
    }

    #history-container {
      margin: 10px auto;
      padding: 15px;
    }

    #history-container h2 {
      font-size: 1.5rem;
    }

    .history-table {
      display: block;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .history-table thead,
    .history-table tbody,
    .history-table tr {
      display: table;
      width: 100%;
      table-layout: fixed;
    }

    .history-table th,
    .history-table td {
      padding: 8px 6px;
      font-size: 14px;
    }

    .history-table .action-buttons {
      flex-direction: column;
    }

    .history-table .action-buttons button {
      width: 100%;
      margin-bottom: 4px;
    }
  }

  @media (max-width: 576px) {
    #history-container {
      padding: 10px;
    }

    #history-container h2 {
      font-size: 1.25rem;
    }

    .history-table th,
    .history-table td {
      padding: 6px 4px;
      font-size: 12px;
    }

    .history-table th:nth-child(2),
    .history-table td:nth-child(2) {
      display: none;
    }
  }
</style>
</head>

<body class="preview-page">
<!-- Back to Home Button - Top Left Corner -->
<button
  id="backBtn"
  onclick="window.location.href='home.html'"
  style="
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 1000;
    background: #007bff;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    transition: background 0.3s ease;
  "
  onmouseover="this.style.background='#0056b3'"
  onmouseout="this.style.background='#007bff'"
>
  ← Back to Home
</button>

<!-- Edit button (top-left, next to back) -->
<button id="editBtn" title="Edit document" onclick="editDocument()" style="position:fixed;top:20px;left:140px;z-index:1000;background:#2d9cdb;color:#fff;border:none;padding:8px 10px;border-radius:6px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.12);">✎ Edit</button>

<!-- Three-dots menu (top-left) -->
<div style="position:fixed;top:18px;left:220px;z-index:1000;">
  <button id="menuToggle" onclick="toggleMenu(event)" style="background:transparent;border:none;font-size:20px;cursor:pointer;padding:6px 8px;">⋮</button>
  <div id="menuBox" style="display:none;position:absolute;left:0;top:36px;background:#fff;border:1px solid #ddd;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,0.08);overflow:hidden;min-width:160px;">
    <button onclick="sendFile()" style="display:block;width:100%;padding:10px 12px;border:none;background:transparent;text-align:left;cursor:pointer;">Send file</button>
    <button onclick="openWith()" style="display:block;width:100%;padding:10px 12px;border:none;background:transparent;text-align:left;cursor:pointer;">Open with</button>
    <button onclick="downloadFile()" style="display:block;width:100%;padding:10px 12px;border:none;background:transparent;text-align:left;cursor:pointer;">Download</button>
    <button onclick="printFile()" style="display:block;width:100%;padding:10px 12px;border:none;background:transparent;text-align:left;cursor:pointer;">Print</button>
  </div>
</div>

<div id="history-container" style="display:none">
  <h2>Invoice History</h2>
  <div style="overflow-x: auto;">
    <table class="history-table">
      <thead>
        <tr>
          <th>Invoice No</th>
          <th>Date</th>
          <th>Client</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<div id="invoice-container"></div>

<script src="js/history.js"></script>
<script>
  // Support opening a specific document via ?doc=... query param
  (function() {
    const params = new URLSearchParams(window.location.search);
    const doc = params.get('doc');

    if (!doc) return; // nothing to do

    // Try to find a matching history entry in localStorage
    const history = JSON.parse(localStorage.getItem('invoiceHistory')) || [];

    // Match by invoiceNo or clientName presence in the doc string
    const match = history.find(entry => {
      const combined = `${entry.clientName || ''} - ${entry.type || entry.category || ''}`.trim();
      if (entry.invoiceNo && doc.includes(String(entry.invoiceNo))) return true;
      if (entry.clientName && doc.includes(entry.clientName)) return true;
      if (combined && doc.includes(combined)) return true;
      return false;
    });

    if (match) {
      // Reuse viewInvoice behavior: store invoiceData and navigate to format
      const invoiceData = match.fullData || match;
      invoiceData.__historyId = match.id;
      localStorage.setItem('invoiceData', JSON.stringify(invoiceData));

      const fmt = match.format || 'format1.html';
      // Navigate to the format page to render the invoice preview
      window.location.href = 'formats/' + fmt;
      return;
    }

    // If not found, show a friendly message in the invoice container
    const container = document.getElementById('invoice-container');
    container.innerHTML = `
      <div style="max-width:900px;margin:40px auto;padding:30px;background:#fff;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,0.06);">
        <h3 style="margin-bottom:12px;color:#0a4b78;">Document not found</h3>
        <p style="margin-bottom:18px;color:#444;">The document you requested appears to be missing or deleted from history.</p>
        <div style="display:flex;gap:12px;">
          <button onclick="window.location.href='home.html'" style="padding:8px 14px;border-radius:6px;border:none;background:#0a4b78;color:#fff;cursor:pointer;">Back to Home</button>
          <button onclick="window.location.href='preview.html?history=1'" style="padding:8px 14px;border-radius:6px;border:1px solid #0a4b78;background:transparent;color:#0a4b78;cursor:pointer;">Open History</button>
        </div>
      </div>
    `;
  })();
</script>
<script>
  // Menu toggle and outside click handling
  function toggleMenu(e) {
    e.stopPropagation();
    const box = document.getElementById('menuBox');
    box.style.display = box.style.display === 'block' ? 'none' : 'block';
  }

  document.addEventListener('click', function(e) {
    const box = document.getElementById('menuBox');
    if (!box) return;
    if (box.style.display === 'block' && !box.contains(e.target) && e.target.id !== 'menuToggle') {
      box.style.display = 'none';
    }
  });

  // Edit: open editor or format page with existing invoiceData
  function editDocument() {
    try {
      const data = JSON.parse(localStorage.getItem('invoiceData')) || JSON.parse(localStorage.getItem('invoiceHistory')) || null;
      if (!data) {
        alert('No document data available to edit.');
        return;
      }

      // If invoiceData is an array (history), try to pick first entry
      let entry = data;
      if (Array.isArray(data) && data.length) entry = data[0];

      // Choose format page if available
      const fmt = entry.format || entry.fmt || 'format1.html';

      // store invoiceData to localStorage so format page can load it
      localStorage.setItem('invoiceData', JSON.stringify(entry));

      // navigate to the format editor (formats folder)
      window.location.href = 'formats/' + fmt;
    } catch (err) {
      console.error(err);
      alert('Unable to open editor.');
    }
  }

  // Send file: open mail client with link to this preview page
  function sendFile() {
    const url = window.location.href;
    const subject = encodeURIComponent('Document review');
    const body = encodeURIComponent('Please review the document: ' + url);
    window.location.href = `mailto:?subject=${subject}&body=${body}`;
  }

  // Open with: create a blob of the HTML and open in a new tab (user can choose app)
  function openWith() {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    window.open(url, '_blank');
    // revoke after a bit
    setTimeout(() => URL.revokeObjectURL(url), 30000);
  }

  // Download: provide .html download of current view (user can save as PDF via print)
  function downloadFile() {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    const filename = 'document-' + (new Date()).toISOString().split('T')[0] + '.html';
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 30000);
  }

  // Print the current page
  function printFile() {
    window.print();
  }
</script>
<script src="https://cdn.emailjs.com/sdk/3.2.0/email.min.js"></script>
<script src="js/simple-login-button.js"></script>
</body>
</html>
