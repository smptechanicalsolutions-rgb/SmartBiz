<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGE_TITLE - SmartBiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="js/navigation-manager.js"></script><script src="js/auth-service.js"></script>
    <script src="js/auth-status.js"></script>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Main Container - Uses full viewport height */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
        }

        /* Header Section */
        .header {
            background: linear-gradient(180deg, #2c3e50 0%, #34495e 100%);
            color: white;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #1a252f;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: white;
        }

        .business-card-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .business-card-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Main Layout Container */
        .main-layout {
            display: flex;
            flex: 1;
            width: 100%;
        }

        /* Sidebar - Fixed Width */
        .sidebar {
            width: 260px;
            background: white;
            border-right: 1px solid #e0e0e0;
            flex-shrink: 0;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 25px 20px;
            border-bottom: 1px solid #f0f0f0;
            text-align: center;
        }

        .company-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
            color: white;
        }

        .company-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .company-tagline {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .sidebar-menu {
            padding: 20px 0;
        }

        .sidebar-nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: #2c3e50;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            gap: 12px;
        }

        .sidebar-nav-item:hover {
            background: #f8f9fa;
            color: #667eea;
        }

        .sidebar-nav-item.active {
            background: #667eea;
            color: white;
        }

        .sidebar-nav-item i {
            width: 20px;
            text-align: center;
        }

        /* Main Content - Takes All Remaining Space */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f5f6fa;
            overflow-y: auto;
        }

        .content-header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .content-actions {
            display: flex;
            gap: 10px;
        }

        .action-button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .action-button.secondary {
            background: #f8f9fa;
            color: #2c3e50;
            border: 1px solid #e0e0e0;
        }

        .action-button {
            background: #667eea;
            color: white;
        }

        .content-area {
            padding: 30px;
            flex: 1;
        }

        /* Bottom Navigation */
        .bottom-nav {
            display: none;
        }

        /* Mobile Responsive Design */
        @media (max-width: 768px) {
            .header {
                height: 50px;
                padding: 0 15px;
            }

            .app-title {
                font-size: 16px;
            }

            .business-card-icon {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }

            .main-layout {
                width: 100%;
                overflow: visible;
            }

            .main-content {
                flex-direction: column;
            }

            .sidebar {
                display: none !important;
            }

            /* Show bottom nav on mobile */
            .bottom-nav {
                position: fixed;
                bottom: 0;
                left: 10px;
                right: 10px;
                width: auto;
                background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
                display: flex !important;
                justify-content: space-around;
                align-items: center;
                padding: 12px 0;
                box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.3);
                z-index: 9999;
                backdrop-filter: blur(10px);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 20px 20px 0 0;
            }
            
            .bottom-nav .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: white;
                text-decoration: none;
                padding: 8px 12px;
                border-radius: 8px;
                transition: all 0.3s ease;
                min-width: 60px;
                font-size: 11px;
                font-weight: 500;
            }
            
            .bottom-nav .nav-item:hover {
                background: rgba(255, 255, 255, 0.2);
                transform: translateY(-2px);
            }
            
            .bottom-nav .nav-item.active {
                background: rgba(255, 255, 255, 0.3);
                border: 1px solid rgba(255, 255, 255, 0.5);
            }
            
            .bottom-nav .nav-item i {
                font-size: 16px;
                margin-bottom: 4px;
            }
            
            .bottom-nav .nav-item span {
                font-size: 10px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .content-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .content-area {
                padding: 20px 15px;
            }

            /* hide the sidebar toggle on mobile now that we use footer nav */
            .mobile-menu-toggle {
                display: none;
            }

            /* show back button on mobile and basic styling */
            .back-icon {
                display: block;
                margin-right: 10px;
                font-size: 18px;
                cursor: pointer;
                transition: all 0.3s ease;
                padding: 8px;
                border-radius: 4px;
                background: rgba(255,255,255,0.1);
            }

            /* reveal the search input at top */
            .search-container {
                display: block;
                padding: 10px 15px;
                background: #fff;
            }

            .search-container input {
                width: 100%;
                padding: 8px 12px;
                border-radius: 20px;
                border: 1px solid #ccc;
                font-size: 14px;
            }

            /* hide status bar on mobile to free space for footer nav */
            .status-bar {
                display: none;
            }

            .mobile-menu-toggle {
                display: none;
            }
        }

        @media (min-width: 769px) {
            .mobile-menu-toggle {
                display: none;
            }
            .back-icon {
                display: none;
            }
            .search-container {
                display: none;
            }
            /* Hide bottom nav on desktop/laptop */
            .bottom-nav {
                display: none !important;
            }
        }
        
        /* Show bottom nav on mobile/tablet */
        @media (max-width: 768px) {
            .main-layout {
                padding-bottom: 120px;
            }
            .content-area {
                padding-bottom: 120px;
            }
            .main-content {
                padding-bottom: 120px;
            }
        }

        /* Page-specific styles - Add your custom styles here */
        PAGE_SPECIFIC_STYLES
    </style>
    <link rel="stylesheet" href="css/app-shell.css" />
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <!-- Back button for mobile -->
                <i class="fas fa-arrow-left back-icon" onclick="goBack()" title="Back"></i>
                <!-- Mobile Menu Toggle (hidden on mobile now) -->
                <button class="mobile-menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <i class="fas fa-user-edit business-card-icon" onclick="goToPersonalInfo()" title="Personal Information"></i>
                <h1 class="app-title">PAGE_TITLE</h1>
            </div>
            <div class="header-right">
                <span id="userEmail" style="font-size:0.9rem;opacity:0.8;margin-right:10px;"></span>
                <a id="loginIcon" class="login-header-btn" href="login.html" style="display:inline-block;">Login</a>
                <i class="fas fa-bell notification-icon"></i>
                <i class="fas fa-cog settings-icon" onclick="goToSettings()" title="Settings" style="cursor:pointer;opacity:0.6;"></i>
            </div>
        </header>

        <!-- Main Layout Container -->
        <div class="main-layout">
            <!-- Search bar shown only on small screens -->
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="SEARCH_PLACEHOLDER" />
            </div>
            <!-- App sidebar (shared: js/app-sidebar.js) -->
            <aside class="sidebar" id="sidebar" data-active="none"></aside>

            <!-- Main Content - Takes All Remaining Space -->
            <main class="main-content">
                <div class="content-header">
                    <div class="breadcrumb">
                        <i class="fas fa-home"></i>
                        <span>Home</span>
                        <i class="fas fa-chevron-right"></i>
                        <span>BREADCRUMB_PAGE</span>
                    </div>
                    <div class="content-actions">
                        <button class="action-button secondary" onclick="refreshData()">
                            <i class="fas fa-sync"></i>
                            Refresh
                        </button>
                        <button class="action-button" onclick="exportData()">
                            <i class="fas fa-download"></i>
                            Export
                        </button>
                    </div>
                </div>

                <div class="content-area">
                    PAGE_CONTENT
                </div>
            </main>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" onclick="navigateTo('home')">
                <i class="fas fa-home"></i>
                <span>HOME</span>
            </div>
            <div class="nav-item" onclick="navigateTo('dashboard')">
                <i class="fas fa-chart-bar"></i>
                <span>DASHBOARD</span>
            </div>
            <div class="nav-item" onclick="navigateTo('products')">
                <i class="fas fa-box"></i>
                <span>ITEMS</span>
            </div>
            <div class="nav-item" onclick="navigateTo('menu')">
                <i class="fas fa-bars"></i>
                <span>MENU</span>
            </div>
            <div class="nav-item" onclick="navigateTo('settings')">
                <i class="fas fa-cog"></i>
                <span>SETTINGS</span>
            </div>
        </nav>
    </div>

    <script>
        // Navigation functions
        function navigateTo(page) {
            window.location.href = page + '.html';
        }

        function goBack() {
            window.history.back();
        }

        function goToPersonalInfo() {
            window.location.href = 'personal-info.html';
        }

        function goToSettings() {
            window.location.href = 'settings.html';
        }

        function refreshData() {
            window.location.reload();
        }

        function exportData() {
            // Export functionality - customize per page
            alert('Export functionality coming soon!');
        }

        // Highlight correct footer nav item on page load
        function markActiveFooter() {
            const page = window.location.pathname.split('/').pop().toLowerCase();
            document.querySelectorAll('.bottom-nav .nav-item').forEach(item => {
                item.classList.remove('active');
                const text = item.querySelector('span')?.textContent?.toLowerCase() || '';
                if (page.includes('ACTIVE_PAGE') && text.includes('ACTIVE_NAV_TEXT')) {
                    item.classList.add('active');
                }
            });
        }

        // Highlight correct sidebar nav item on page load
        function markActiveSidebar() {
            const page = window.location.pathname.split('/').pop().toLowerCase();
            document.querySelectorAll('.sidebar-nav-item').forEach(item => {
                item.classList.remove('active');
                const text = item.querySelector('span')?.textContent?.toLowerCase() || '';
                if (page.includes('ACTIVE_PAGE') && text.includes('ACTIVE_NAV_TEXT')) {
                    item.classList.add('active');
                }
            });
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            markActiveFooter();
            markActiveSidebar();
            
            // Update authentication UI
            if (typeof updateAuthUI === 'function') {
                updateAuthUI();
            }
        });

        PAGE_SPECIFIC_SCRIPTS
    </script>
    <script src="js/app-sidebar.js"></script>
    <script src="js/simple-login-button.js"></script>
</body>
</html>
